<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventura SIM karet</title>
    <link rel="icon" href="simka.png" type="image/x-icon">
    <style>
        :root {
            --nokia-blue: #0055A4;
            --vodafone-red: #e60000;
            --tmobile-pink: #ea0a8e;
            --o2-blue: #0090d0;
            --default-gray: #ccc;
        }

        /* Loading */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        /*Pracuju*/
        #loader-wrapper img {
            width: 400px; 
            height: auto;
        }

        #loader-wrapper p {
            margin-top: 20px;
            font-family: sans-serif;
            color: var(--nokia-blue);
            font-weight: bold;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        h1, h2 {
            color: #1a1a1a;
            border-bottom: 2px solid var(--nokia-blue);
            padding-bottom: 10px;
            margin-top: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .karta {
            background: white;
            border: 2px solid var(--default-gray);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease-in-out;
        }

        .karta.vodafone { border-color: var(--vodafone-red); }
        .karta.t-mobile { border-color: var(--tmobile-pink); }
        .karta.o2 { border-color: var(--o2-blue); }

        .id-sim { font-size: 1.4em; font-weight: bold; margin-bottom: 8px; color: var(--nokia-blue); }
        .vodafone .id-sim { color: var(--vodafone-red); }
        .t-mobile .id-sim { color: var(--tmobile-pink); }
        .o2 .id-sim { color: var(--o2-blue); }

        .cislo-text { font-size: 1.1em; font-weight: 500; margin-bottom: 15px; display: block; }

        .info-radek {
            font-size: 0.9em;
            margin: 5px 0;
            color: #555;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }

        .label { font-weight: bold; color: #888; }

        .karta-deaktivovana {
            opacity: 0.6;
            background: #e9e9e9;
            border-style: dashed !important;
            border-color: #999 !important;
        }

        .karta:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .cara-oddelovac { margin: 60px 0 20px 0; }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <img src="pracuju.gif" alt="Načítám...">
    </div>

    <h1>Pepovy SIMky</h1>
    <div id="moje-sim" class="grid"></div>

    <div class="cara-oddelovac">
        <h1>Ondrovy SIMky</h1>
        <div id="kolegy-sim" class="grid"></div>
    </div>

    <div class="cara-oddelovac">
        <h2>Deaktivované / Ostatní</h2>
        <div id="deaktivovane-sim" class="grid"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz_yNA4X4vpyaB-6sbCT7UZUFKpA8yxoECVefUqNG4mOagkHrimePyd_gSUhWPsOHqs/exec";

        async function nactiData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                renderujSekci(data.moje, 'moje-sim');
                renderujSekci(data.kolegy, 'kolegy-sim');
                renderujSekci(data.deaktivovane, 'deaktivovane-sim', true);

                // Skrytí loaderu
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);

            } catch (err) {
                console.error("Chyba:", err);
                document.getElementById('loader-wrapper').innerHTML = "<p>Tabulka se nechce spojit.</p>";
            }
        }

        function urciOperatora(text) {
            const t = text.toLowerCase();
            if (t.includes('vodafone')) return 'vodafone';
            if (t.includes('t-mobile')) return 't-mobile';
            if (t.includes('o2')) return 'o2';
            return 'default';
        }

        function renderujSekci(seznam, elementId, jeDeaktivovana = false) {
            const container = document.getElementById(elementId);
            container.innerHTML = "";

            seznam.forEach(sim => {
                const opClass = urciOperatora(sim.zbytekTextu);
                const karta = document.createElement('div');
                karta.className = `karta ${opClass}` + (jeDeaktivovana ? ' karta-deaktivovana' : '');
                
                karta.innerHTML = `
                    <div class="id-sim">${sim.idSim}</div>
                    <span class="cislo-text">${sim.zbytekTextu}</span>
                    <div class="info-radek">
                        <span class="label">V telefonu:</span>
                        <span>${sim.vTelefonu || '---'}</span>
                    </div>
                    <div class="info-radek">
                        <span class="label">Platí do:</span>
                        <span>${sim.platnost || 'neuvedeno'}</span>
                    </div>
                `;
                container.appendChild(karta);
            });
        }

        nactiData();
    </script>
</body>
</html>
